<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Recipe Finder</title>
  </head>

  <body class="bg-pink-500 text-white min-h-screen">
    <!-- PAGE CONTAINER -->
    <div class="px-6 lg:px-8">
      <div class="mx-auto max-w-7xl">
        <!-- NAVIGATION -->
        <nav
          class="mt-6 mx-auto w-fit rounded-xl border border-white/10 bg-gray-800/80 backdrop-blur"
        >
          <div class="px-6">
            <div class="flex h-14 items-center justify-center gap-4">
              <a
                href="index.html"
                class="rounded-md bg-gray-900 px-4 py-2 text-sm font-medium text-white"
              >
                Home
              </a>

              <a
                href="favorites.html"
                class="rounded-md px-4 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white"
              >
                Favorites
              </a>
              <a
                href="concerns.html"
                class="rounded-md px-4 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white"
              >
                Concerns
              </a>
            </div>
          </div>
        </nav>

        <!-- SEARCH BAR -->
        <div class="mt-10">
          <form
            id="searchForm"
            class="mx-auto flex w-full max-w-xl overflow-hidden rounded-2xl border border-white/10 bg-gray-800 shadow-lg"
          >
            <input
              type="text"
              id="search"
              placeholder="Search your favorite recipe"
              class="w-full bg-transparent px-4 py-3 text-white placeholder:text-gray-400 focus:outline-none"
            />
            <button
              type="submit"
              id="submitBtn"
              class="bg-indigo-600 px-6 text-white hover:bg-indigo-500 transition"
            >
              Search
            </button>
          </form>
        </div>

        <!-- DIET RESTRICTIONS BUTTONS -->
        <div class="mt-8 flex justify-center gap-4">
          <button id = "veganBtn"
            class="rounded-md bg-gray-700 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-gray-600 transition"
          >
            Vegan
          </button>

          <button id = "PaleoBtn"
            class="rounded-md bg-gray-700 px-4 py-2 text-sm font-semibold text-white hover:bg-gray-600 transition"
          >
            Paleo
          </button>

          <button id = "gfBtn"
            class="rounded-md bg-gray-700 px-4 py-2 text-sm font-semibold text-white hover:bg-gray-600 transition"
          >
            Gluten Free
          </button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="mx-auto max-w-5xl">
          <div
            id="content"
            class="content grid grid-cols-1 sm:grid-cols-2 gap-6 mt-10"
          ></div>
        </div>

        <section class="mt-20 pb-20">
          <div class="mx-auto max-w-2xl text-center">
            <h2
              class="text-4xl font-semibold tracking-tight text-white sm:text-5xl"
            >
              Contact
            </h2>
            <p class="mt-3 text-gray-300">Send concerns or feedback.</p>
          </div>

          <div
            class="mx-auto mt-10 max-w-xl rounded-2xl border border-white/10 bg-gray-800/60 p-6 shadow-lg"
          >
            <form class="space-y-6" id="submitContact">
              <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                <div>
                  <label
                    for="first-name"
                    class="block text-sm font-semibold text-white"
                    >First name</label
                  >
                  <input
                    required
                    id="firstName"
                    type="text"
                    name="first-name"
                    class="mt-2 w-full rounded-md bg-white/5 px-3.5 py-2 text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
                  />
                </div>

                <div>
                  <label
                    for="last-name"
                    class="block text-sm font-semibold text-white"
                    >Last name</label
                  >
                  <input
                    required
                    id="lastName"
                    type="text"
                    name="last-name"
                    class="mt-2 w-full rounded-md bg-white/5 px-3.5 py-2 text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
                  />
                </div>
              </div>

              <div>
                <label
                  for="company"
                  class="block text-sm font-semibold text-white"
                  >Subject</label
                >
                <input
                  required
                  id="subject"
                  type="text"
                  name="company"
                  class="mt-2 w-full rounded-md bg-white/5 px-3.5 py-2 text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
                />
              </div>

              <div>
                <label
                  for="email"
                  class="block text-sm font-semibold text-white"
                  >Email</label
                >
                <input
                  required
                  id="email"
                  type="email"
                  name="email"
                  class="mt-2 w-full rounded-md bg-white/5 px-3.5 py-2 text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
                />
              </div>

              <div>
                <label
                  for="message"
                  class="block text-sm font-semibold text-white"
                  >Message</label
                >
                <textarea
                  required
                  id="message"
                  name="message"
                  rows="6"
                  class="mt-2 w-full rounded-md bg-white/5 px-3.5 py-2 text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
                ></textarea>
              </div>

              <button
                class="w-full rounded-md bg-indigo-600 px-3.5 py-2.5 text-center text-sm font-semibold text-white shadow hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500"
              >
                Send Concerns
              </button>
            </form>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
